<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <form>
      <label for="nome">Nome: </label>
      <input
        type="text"
        id="nome"
        name="usuario_nome"
        placeholder="Nome de Usuário"
        required
      />

      <label for="email">E-mail: </label>
      <input
        type="email"
        id="email"
        name="usuario_email"
        placeholder="E-mail do Usuário"
        required
      />

      <label for="data_nascimento"> Data de Nascimento:</label>
      <input
        type="date"
        id="data_nascimento"
        name="usuario_data_nascimento"
        required
      />

      <label for="senha">Senha: </label>
      <input
        type="password"
        id="senha"
        name="usuario_senha"
        placeholder="Senha do Usuário"
        required
      />

      <label for="teste">Comentário</label>
      <textarea rows="20" id="teste" name="usuario_comentario"></textarea>
    </form>
  </body>
</html>
