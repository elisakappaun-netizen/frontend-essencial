<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endereços com ViaCEP</title>
   
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Cadastro de Endereço</h1>
        <p>Preencha o CEP para buscar o endereço.</p>
      </header>

      <div class="card">
        <div class="form-grid">
          <div class="field">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Ex: João Silva" />
          </div>

          <div class="field">
            <label for="cep">CEP</label>
            <div class="cep-wrap">
              <input
                type="text"
                id="cep"
                placeholder="00000-000"
                maxlength="9"
                oninput="maskCEP(this)"
              />
            </div>
          </div>

          <div class="field full">
            <label for="logradouro">Logradouro</label>
            <input
              type="text"
              id="logradouro"
              placeholder="Preenchido automaticamente"
            />
          </div>

          <div class="field">
            <label for="bairro">Bairro</label>
            <input type="text" id="bairro" placeholder="Bairro" />
          </div>

          <div class="field">
            <label for="numero">Número</label>
            <input type="text" id="numero" placeholder="123" />
          </div>

          <div class="field">
            <label for="localidade">Cidade</label>
            <input
              type="text"
              id="localidade"
              placeholder="Preenchida automaticamente"
            />
          </div>

          <div class="field">
            <label for="uf">UF</label>
            <input type="text" id="uf" placeholder="RJ" maxlength="2" />
          </div>
        </div>

        <div id="status" class="status"></div>

        <div class="btn-row">
          <button class="btn primary" type="submit">Salvar</button>
          <button class="btn" type="reset">Limpar</button>
        </div>
      </div>
    </div>
  </body>
</html>
