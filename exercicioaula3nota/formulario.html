<!DOCTYPE html>
<html lang="pt-BR">
<head>
       <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style2.css">
    <link rel="icon" href="/exercicioaula3nota/assets/tituloBaguete.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Avaliação</title>
</head>
<body class="formulario">
    <div class="conteinerFormulario">
        <h2>Deixe Seu Feedback!</h2>
        <p>Adoraria saber o que achou da minha página e dos pães</p>

            <form>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Como quer ser chamado?">

                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="seupaozinho@muito.com">
       
                <label for="telefone">Telefone(Opcional):</label>
                <input type="tel" id="telefone" placeholder="(00) 0000-0000">

                <p class="perguntaform">Gostou da Página?</p>
                <div class="opcao">
                    <label>
                        <input type="radio" name="gostou" value="sim"> Sim, ficou Show!
                    </label>

                    <label>
                        <input type="radio" name="gostou" value="não"> Não, pode Melhorar!
                    </label>
                </div>

                    <label for="mensagem">Fale com seu Pãozinho: </label>
                    <textarea id="mensagem" rows="4" placeholder="Deixe seu Recado"></textarea>

                    <button type="submit" class="botaoEnviar">Enviar Feedback</button>

            </form>
    </div>
</body>
</html>
